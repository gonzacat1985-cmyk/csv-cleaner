<!DOCTYPE html>
<html>
<head>
    <title>CleanCSV</title>
    <style>
        body {
            font-family: Arial;
            background-color: #0f172a;
            color: white;
            text-align: center;
            padding-top: 100px;
        }

        .box {
            background: #1e293b;
            padding: 30px;
            border-radius: 10px;
            display: inline-block;
        }

        button {
            padding: 10px 20px;
            margin-top: 10px;
            background-color: #22c55e;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
        }

        input {
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>CleanCSV</h2>
    <p>Subí tu archivo y limpiá datos automáticamente</p>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="archivo"><br>
        <button type="submit">Limpiar CSV</button>
    </form>
</div>

</body>
</html>
