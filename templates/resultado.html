<!DOCTYPE html>
<html>
<head>
    <title>Resultado</title>
    <style>
        body {
            font-family: Arial;
            background-color: #0f172a;
            color: white;
            text-align: center;
            padding-top: 100px;
        }

        .box {
            background: #1e293b;
            padding: 30px;
            border-radius: 10px;
            display: inline-block;
        }

        button {
            padding: 10px 20px;
            margin: 10px;
            background-color: #3b82f6;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Archivo procesado</h2>

    <p>Filas originales: {{ antes }}</p>
    <p>Filas finales: {{ despues }}</p>
    <p>Eliminadas: {{ eliminadas }}</p>

    <br>

    <a href="/descargar">
        <button>Descargar CSV limpio</button>
    </a>

    <br>

    <a href="/">
        <button>Volver</button>
    </a>
</div>

</body>
</html>
